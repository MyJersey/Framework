<!DOCTYPE html>
<html lang="en">

<!-- product-detail.html
     Reads the selected product ID from localStorage,
     fetches the matching product from the API, and renders full details
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Natural Skincare</title>
    <!-- Bootstrap CSS for responsive layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Playfair Display and Inter -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap Icons icon font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar placeholder filled by loader.js -->
    <div id="nav"></div>

    <div class="container my-5 py-5">
        <!-- Product detail layout is injected here by the inline script below -->
        <div class="row" id="product-detail-container">
        </div>
    </div>

    <!-- Footer placeholder filled by loader.js -->
    <div id="footer"></div>

    <!-- Load services first -->
    <script src="js/services/StorageService.js"></script>
    <script src="js/services/AuthService.js"></script>
    <script src="js/services/CartService.js"></script>
    <script src="js/services/UIManager.js"></script>

    <!-- Load shared layout loader, product catalog, and shop utilities -->
    <script src="js/loader.js"></script>
    <script src="js/product.js"></script>
    <script src="js/shop.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Retrieve the product ID stored in storage when the user clicked a product card
            const productId = StorageService.getSelectedProductId();
            const container = document.getElementById('product-detail-container');

            await UIManager.refreshNavbar();

            if (!productId) {
                container.innerHTML = "<div class='text-center py-5'><h2>Product not found.</h2><a href='shop.html' class='btn btn-outline-dark mt-3'>Back to Shop</a></div>";
                return;
            }

            // Fetch product details from the API
            try {
                const res = await fetch(`/products/${productId}`);
                if (!res.ok) throw new Error("Product not found");
                const product = await res.json();

                // Render the product detail layout
                container.innerHTML = `
                <div class="col-md-6 mb-4 text-center">
                    <div class="bg-light p-4 rounded shadow-sm d-flex align-items-center justify-content-center" style="height: 500px;">
                        <img src="${product.image}" class="img-fluid" style="max-height: 100%; object-fit: contain;" alt="${product.name}">
                    </div>
                </div>
                <div class="col-md-6 px-lg-5">
                    <!-- Breadcrumb navigation to links back to the shop -->
                    <nav aria-label="breadcrumb" class="mb-4">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="shop.html" class="text-decoration-none text-muted">Shop</a></li>
                            <li class="breadcrumb-item active">${product.category}</li>
                        </ol>
                    </nav>
                    <h1 class="display-4 fw-bold mb-3">${product.name}</h1>
                    <h2 class="text-success mb-4 fw-light">€ ${product.price.toFixed(2)}</h2>
                    <p class="lead text-muted mb-4">${product.description}</p>

                    <!-- Skin type highlight block -->
                    <div class="p-3 bg-light border-start border-4 border-success mb-4">
                        <small class="text-uppercase fw-bold text-muted d-block">Ideal for:</small>
                        <span class="fs-5">${product.skinType} Skin</span>
                    </div>

                    <!-- Displaying Ingredients -->
                    <div class="mb-4">
                        <h5 class="fw-bold">Ingredients:</h5>
                        <p class="text-muted small">
                            ${Array.isArray(product.ingredients) && product.ingredients.length > 0
                                ? product.ingredients.join(', ')
                                : 'Natural botanical extracts.'}
                        </p>
                    </div>

                    <!-- Displaying How to Use -->
                    <div class="mb-4">
                        <h5 class="fw-bold">How to Use:</h5>
                        <p class="text-muted small">
                            ${product.howToUse || 'Apply uniformly to skin as needed.'}
                        </p>
                    </div>

                    <!-- Quantity selector -->
                    <div class="d-flex align-items-center mb-4 gap-3">
                        <label for="detail-qty" class="fw-bold mb-0">Quantity:</label>
                        <input type="number" id="detail-qty" class="form-control rounded-0 text-center" value="1" min="1" max="10" style="width: 80px;">
                    </div>

                    <button class="btn btn-dark btn-lg w-100 py-3 rounded-0 shadow" onclick="addToCartDetail(${product.id})">
                        ADD TO CART
                    </button>
                </div>
                `;
            } catch {
                // Show a fallback message if no product ID was found or the ID is invalid.
                container.innerHTML = "<div class='text-center py-5'><h2>Product not found.</h2><a href='shop.html' class='btn btn-outline-dark mt-3'>Back to Shop</a></div>";
            }
        });

        // Adds the displayed product to the cart with the selected quantity
        async function addToCartDetail(id) {
            const qtyInput = document.getElementById('detail-qty');
            const quantity = qtyInput ? parseInt(qtyInput.value) || 1 : 1;

            await addToCart(null, id, quantity);
        }
    </script>
</body>

</html>
