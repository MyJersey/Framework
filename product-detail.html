        // Adds the displayed product to the cart with the quantity chosen by the user.
        // If the product is already in the cart, its quantity is incremented instead of adding a duplicate.
        function addToCartDetail(id) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];

            // Read the selected quantity from the number input; default to 1 if missing or invalid.
            const qtyInput = document.getElementById('detail-qty');
            const quantityToAdd = qtyInput ? parseInt(qtyInput.value) || 1 : 1;

            const existingIndex = cart.findIndex(p => p.id === id);
            if (existingIndex > -1) {
                cart[existingIndex].quantity = (cart[existingIndex].quantity || 1) + quantityToAdd;
            } else {
                const product = products.find(p => p.id === id);
                if (product) {
                    product.quantity = quantityToAdd;
                    cart.push(product);
                }
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge(); 
            alert("Wonderful choice! The product has been added to your cart.");
        }
    </script>
