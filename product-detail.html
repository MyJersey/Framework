<!DOCTYPE html>
<html lang="en">

<!-- product-detail.html — Individual product detail page.
     Reads the selected product ID from localStorage (set by goToDetail() in shop.js),
     finds the matching product in the catalog, and renders full details:
     image, name, price, description, skin type, ingredients, how-to-use, and an add-to-cart button. -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Natural Skincare</title>
    <!-- Bootstrap CSS for responsive layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Playfair Display and Inter -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap Icons icon font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Site-wide custom styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar placeholder — filled dynamically by loader.js -->
    <div id="nav"></div>

    <div class="container my-5 py-5">
        <!-- Product detail layout is injected here by the inline script below -->
        <div class="row" id="product-detail-container">
        </div>
    </div>

    <!-- Footer placeholder — filled dynamically by loader.js -->
    <div id="footer"></div>


    <!-- Load shared layout loader, product catalog, and shop utilities -->
    <script src="js/loader.js"></script>
    <!-- <script src="js/product.js"></script> -->
    <script src="js/shop.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const productId = localStorage.getItem('selectedProductId');
            const container = document.getElementById('product-detail-container');

            updateCartBadge();

            if (!productId) {
                container.innerHTML = "<h2>No product selected</h2>";
                return;
            }

            // ✅ 用 API 获取 product
            fetch(`/products/${productId}`)
                .then(res => {
                    if (!res.ok) throw new Error("Product not found");
                    return res.json();
                })
                .then(product => {

                    container.innerHTML = `
            <div class="col-md-6 mb-4 text-center">
                <div class="bg-light p-4 rounded shadow-sm d-flex align-items-center justify-content-center" style="height: 500px;">
                    <img src="${product.image}" class="img-fluid" style="max-height: 100%; object-fit: contain;" alt="${product.name}">
                </div>
            </div>

            <div class="col-md-6 px-lg-5">
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="shop.html" class="text-decoration-none text-muted">Shop</a></li>
                        <li class="breadcrumb-item active">${product.category}</li>
                    </ol>
                </nav>

                <h1 class="display-4 fw-bold mb-3">${product.name}</h1>
                <h2 class="text-success mb-4 fw-light">€ ${product.price.toFixed(2)}</h2>
                <p class="lead text-muted mb-4">${product.description}</p>

                <div class="p-3 bg-light border-start border-4 border-success mb-4">
                    <small class="text-uppercase fw-bold text-muted d-block">Ideal for:</small>
                    <span class="fs-5">${product.skinType} Skin</span>
                </div>

                <div class="mb-4">
                    <h5 class="fw-bold">Ingredients:</h5>
                    <p class="text-muted small">
                        ${Array.isArray(product.ingredients)
                            ? product.ingredients.join(', ')
                            : product.ingredients}
                    </p>
                </div>

                <div class="mb-4">
                    <h5 class="fw-bold">How to Use:</h5>
                    <p class="text-muted small">
                        ${product.howToUse}
                    </p>
                </div>

                <div class="d-flex align-items-center mb-4 gap-3">
                    <label for="detail-qty" class="fw-bold mb-0">Quantity:</label>
                    <input type="number" id="detail-qty" class="form-control rounded-0 text-center" value="1" min="1" max="10" style="width: 80px;">
                </div>

                <button class="btn btn-dark btn-lg w-100 py-3 rounded-0 shadow"
                    onclick="addToCartDetail(${product.id})">
                    ADD TO CART
                </button>
            </div>
            `;
                })
                .catch(() => {
                    container.innerHTML = "<h2>Product not found</h2>";
                });
        });


        function addToCartDetail(productId) {

            const user = localStorage.getItem('userName') || 'guest';

            const qtyInput = document.getElementById('detail-qty');
            const quantity = qtyInput ? parseInt(qtyInput.value) || 1 : 1;

            const requests = [];

            for (let i = 0; i < quantity; i++) {
                requests.push(
                    fetch(`/cart/${user}/${productId}`, {
                        method: 'POST'
                    })
                );
            }

            Promise.all(requests).then(() => {
                updateCartBadge();
                alert("Wonderful choice! The product has been added to your cart.");
            });
        }
    </script>
</body>

</html>
