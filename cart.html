<!DOCTYPE html>
<html lang="en">

<!--
  cart.html
  Shopping Cart Page | Manage items in cart and proceed to checkout
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Natural Skincare</title>
    <!-- Bootstrap CSS for responsive layout and table styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons icon font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts: Playfair Display and Inter -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Custom styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation bar loaded by loader.js -->
    <div id="nav"></div>

    <div class="container my-5 py-5">
        <h2 class="display-5 mb-5">Your Shopping Cart</h2>

        <div class="row">

            <!-- Left column with cart items table -->
            <div class="col-lg-8">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <!-- id used by UIManager to inject item -->
                        <tbody id="cart-items-container">
                            <!-- Cart rows rendered by UIManager -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Right column with summary and checkout button -->
            <div class="col-lg-4">
                <div class="p-4 bg-light border">
                    <h4 class="fw-bold mb-4">Summary</h4>

                    <!-- Subtotal amount -->
                    <div class="d-flex justify-content-between mb-3">
                        <span>Subtotal</span>
                        <span id="cart-total">€ 0.00</span>
                    </div>

                    <!-- Shipping info -->
                    <div class="d-flex justify-content-between mb-4">
                        <span>Shipping</span>
                        <span class="text-success">Free</span>
                    </div>

                    <hr>

                    <!-- Final total -->
                    <div class="d-flex justify-content-between mb-4 fw-bold fs-5">
                        <span>Total</span>
                        <span id="final-total">€ 0.00</span>
                    </div>

                    <!-- Checkout button -->
                    <button class="btn btn-dark w-100 py-3 rounded-0" onclick="checkout()">PROCEED TO CHECKOUT</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer placeholder loaded by loader.js -->
    <div id="footer"></div>
        
    <!-- Load services first -->
    <script src="js/services/StorageService.js"></script>
    <script src="js/services/AuthService.js"></script>
    <script src="js/services/CartService.js"></script>
    <script src="js/services/UIManager.js"></script>

    <!-- Load shared layout loader, product catalog, and shop utilities -->
    <script src="js/loader.js"></script>
    <script src="js/product.js"></script>
    <script src="js/shop.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Render the cart table and update the navbar
            UIManager.renderCart(CartService.getCart());
            UIManager.refreshNavbar();
        });

        // Simulation of checkout
        function checkout() {
            if (CartService.getCart().length === 0) {
                alert("Your cart is empty!");
                return;
            }
            alert("Thank you for your order! (Checkout simulated)");
            CartService.clear();
            UIManager.renderCart([]);
            UIManager.refreshNavbar();
        }
    </script>
    <!-- Bootstrap JS bundle required for responsive navbar toggler -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
