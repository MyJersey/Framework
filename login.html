<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Natural Skincare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: #fff;
            border: 1px solid #eee;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 sticky-top shadow-sm">
        <div class="container-fluid px-lg-5">
            <a class="navbar-brand fs-3 m-0" href="index.html">Natural Skincare</a>

            <div class="collapse navbar-collapse justify-content-center order-lg-2" id="navbarNav">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-3 order-lg-3 ms-auto ms-lg-0">
                <a href="login.html" class="text-dark" id="login-icon">
                    <i class="bi bi-person fs-4"></i>
                </a>

                <div id="user-greeting"></div>

                <a href="cart.html" class="text-dark position-relative me-2">
                    <i class="bi bi-bag fs-5"></i>
                    <span id="cart-badge"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="login-container shadow-sm">
            <h2 class="text-center fw-bold mb-4">Welcome Back</h2>
            <p class="text-center text-muted mb-4">Please enter your name to start shopping</p>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Full Name</label>
                    <input type="text" class="form-control rounded-0" id="username" placeholder="e.g. Jane Doe"
                        required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control rounded-0" id="password" placeholder="••••••••" required>
                    <small class="text-muted text-center d-block mt-2">Simulation: any password works!</small>
                </div>
                <button type="submit" class="btn btn-dark w-100 py-2 rounded-0 mb-3">LOGIN</button>
            </form>

            <div class="text-center mt-3">
                <a href="index.html" class="text-decoration-none text-muted small">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/product.js"></script>
    <script src="js/shop.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const nameInput = document.getElementById('username').value.trim();

            if (nameInput.length < 2) {
                alert("Please enter a valid name.");
                return;
            }

            // SALVATAGGIO: Usa 'userName' (con la N maiuscola)
            localStorage.setItem('userName', nameInput);

            // Feedback e reindirizzamento
            // Non c'è bisogno di alert se vuoi un'esperienza più fluida
            window.location.href = 'index.html';
        });


    </script>
</body>

</html>
