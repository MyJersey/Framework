<!DOCTYPE html>
<html lang="en">

<!--
  shop.html
  Product Shop Page | Browse, filter, and purchase skincare products
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Natural Skincare</title>

    <!-- Bootstrap CSS for responsive layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Playfair Display and Inter -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap Icons icon font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation bar filled dynamically by loader.js -->
    <div id="nav"></div>

    <div class="container my-5">
        <div class="row">

            <!-- Sidebar with filter controls for category, skin type, and collection -->
            <aside class="col-lg-3 mb-5">
                <div class="p-4 bg-light shadow-sm">
                    <h5 class="fw-bold mb-4">Filter Products</h5>

                    <!-- Category filter -->
                    <!-- id used by shop.js to filter by category -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Category</label>
                        <select class="form-select" id="categoryFilter">
                            <option value="all">All Products</option>
                        </select>
                    </div>

                    <!-- Skin type checkboxes -->
                    <!-- "skin-filter" used by shop.js to filter by skin type -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Skin Type</label>
                        <div class="form-check">
                            <input class="form-check-input skin-filter" type="checkbox" value="Sensitive" id="skinSens">
                            <label class="form-check-label" for="skinSens">Sensitive Skin</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input skin-filter" type="checkbox" value="Dry" id="skinDry">
                            <label class="form-check-label" for="skinDry">Dry Skin</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input skin-filter" type="checkbox" value="Combination"
                                id="skinMix">
                            <label class="form-check-label" for="skinMix">Combination Skin</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input skin-filter" type="checkbox" value="Oily" id="skinOily">
                            <label class="form-check-label" for="skinOily">Oily Skin</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input skin-filter" type="checkbox" value="Mature" id="skinMature">
                            <label class="form-check-label" for="skinMature">Mature Skin</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input skin-filter" type="checkbox" value="All types" id="skinAll">
                            <label class="form-check-label" for="skinAll">All types</label>
                        </div>
                    </div>

                    <!-- Collection checkboxes -->
                    <!-- "collection-filter" used by shop.js to filter by collection -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Collections</label>
                        <div class="form-check">
                            <input class="form-check-input collection-filter" type="checkbox" value="bestsellers"
                                id="colBestsellers">
                            <label class="form-check-label" for="colBestsellers">Bestsellers</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input collection-filter" type="checkbox" value="new"
                                id="colNewArrivals">
                            <label class="form-check-label" for="colNewArrivals">New Arrivals</label>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Product grid populated by shop.js -->
            <!-- id used by UIManager to inject product cards -->
            <main class="col-lg-9">
                <div class="row g-4" id="productGrid">
                    <!-- Product cards rendered by UIManager -->
                </div>
            </main>

        </div>
    </div>

    <!-- Footer placeholder filled by loader.js -->
    <div id="footer"></div>
    <!-- Load services first -->
    <script src="js/services/StorageService.js"></script>
    <script src="js/services/AuthService.js"></script>
    <script src="js/services/CartService.js"></script>
    <script src="js/services/UIManager.js"></script>

    <!-- Load shared layout loader and shop logic -->
    <script src="js/loader.js"></script>
    <script src="js/shop.js"></script>
    <!-- Bootstrap JS bundle required for responsive navbar toggler -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
